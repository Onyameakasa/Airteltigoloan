<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirtelTigo Loan Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>
    <style>
        .bg-at-blue { background-color: #002d5d; }
        .text-at-blue { color: #002d5d; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">
    <nav class="bg-white shadow-md p-3 sm:p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-center px-4">
            <img src="at-logo.jpg" alt="at logo" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full object-cover mr-2 sm:mr-3 border-2 border-at-blue shadow-sm">
            <span class="text-lg sm:text-2xl font-black text-at-blue tracking-tight">Airteltigo</span>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4 py-6 sm:py-8">
        <a href="index.html" class="inline-flex items-center text-gray-600 mb-6 hover:text-at-blue font-bold transition-colors text-sm sm:text-base">
            <svg class="w-4 h-4 sm:w-5 sm:h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back
        </a>

        <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Loan Application</h2>
            <p class="text-gray-400 font-bold text-xs uppercase tracking-widest mb-8">Step 1 of 3</p>

            <form id="app-form-1" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">Loan Type</label>
                    <select id="loan-type" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 focus:border-at-blue outline-none transition-colors font-medium text-gray-800">
                        <option>Personal Loan</option>
                        <option>Business Loan</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">Loan Amount (GHS)</label>
                    <input type="number" id="loan-amount-input" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 focus:border-at-blue outline-none transition-colors font-bold text-at-blue text-lg">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">Loan Term</label>
                    <select id="loan-term-input" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 focus:border-at-blue outline-none transition-colors font-medium text-gray-800">
                        <option value="12">12 Months</option>
                        <option value="24">24 Months</option>
                        <option value="36">36 Months</option>
                        <option value="48">48 Months</option>
                        <option value="60">60 Months</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">Purpose of Loan</label>
                    <textarea id="loan-purpose" placeholder="What will you use the loan for?" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 h-24 sm:h-32 focus:border-at-blue outline-none transition-colors font-medium text-gray-800 resize-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-at-blue text-white font-bold py-4 rounded-xl hover:shadow-lg transition-all text-base sm:text-lg">
                    NEXT STEP
                </button>
            </form>
        </div>

        <footer class="text-center py-8 sm:py-12 text-gray-400 text-xs sm:text-sm">
            © 2026 Airteltigo Ghana
        </footer>
    </div>

    <script>
        const form = document.getElementById('app-form-1');
        const amountInput = document.getElementById('loan-amount-input');
        const termInput = document.getElementById('loan-term-input');
        const typeInput = document.getElementById('loan-type');
        const purposeInput = document.getElementById('loan-purpose');

        const data = AppData.get();
        if (data.amount) amountInput.value = data.amount;
        if (data.term) termInput.value = data.term;
        if (data.type) typeInput.value = data.type;
        if (data.purpose) purposeInput.value = data.purpose;

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            AppData.save({
                amount: amountInput.value,
                term: termInput.value,
                type: typeInput.value,
                purpose: purposeInput.value
            });
            location.href = 'application-step2.html';
        });
    </script>
</body>
</html>
